# 源数据库
source:
  host: "127.0.0.1"
  port: 3306
  user: "root"
  password: "your_password"

# 目标数据库
target:
  host: "127.0.0.1"
  port: 3306
  user: "root"
  password: "your_password"
  database: "Z"

# 同步规则（灵活配置）
rules:
  # 方式1：同步整个库的所有表
  - source_db: "A"
    source_table: "*"         # * 表示全部表
    target_db: "Z"

  # 方式2：同步指定的多张表
  - source_db: "B"
    source_table: ["b1", "b2", "b3", "b4"]
    target_db: "Z"

  # 方式3：同步单张表，自定义目标表名
  - source_db: "C"
    source_table: "c"
    target_db: "Z"
    target_table: "c_renamed"  # 可选，不填则跟源表同名

# Binlog server_id（不能跟其他从库冲突）
server_id: 100

# Web 管理界面端口
web_port: 8520

# 日志级别
log_level: "INFO"
