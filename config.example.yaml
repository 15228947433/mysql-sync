# MySQL Sync 配置文件
# 首次使用：打开 Web 界面 http://your-ip:8520 通过向导配置
# 或者手动填写以下配置后重启容器

# 源数据库（从哪里同步）
source:
  host: "127.0.0.1"
  port: 3306
  user: "root"
  password: ""

# 目标数据库（同步到哪里）
target:
  host: "127.0.0.1"
  port: 3306
  user: "root"
  password: ""
  database: ""

# 同步规则（留空，通过 Web 界面配置）
rules: []

# server_id: 100
# batch_size: 500
# flush_interval: 1.0
# pool_size: 5
# sync_type: "full_and_incr"
# web_port: 8520
# log_level: "INFO"
